worker_processes 1;
error_log /home/sasha/keylessh/nginx/error.log info;
pid /home/sasha/keylessh/nginx/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log /home/sasha/keylessh/nginx/access.log;

    server {
        listen 8443 ssl;
        server_name localhost;

        # Server TLS cert (self-signed for local dev)
        ssl_certificate     /home/sasha/keylessh/nginx/server-tls.crt;
        ssl_certificate_key /home/sasha/keylessh/nginx/server-tls.key;

        # Client certificate verification (mTLS)
        # "optional" = request client cert, but don't reject if missing
        # (TideCloak needs to handle both mTLS and non-mTLS requests)
        ssl_client_certificate /home/sasha/keylessh/nginx/client-ca.crt;
        ssl_verify_client optional_no_ca;
        ssl_verify_depth 2;

        # Forward client cert info to TideCloak via headers
        # TideCloak's TideMtlsAuthenticator reads these
        location / {
            proxy_pass http://localhost:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass the full client certificate (PEM, URL-encoded)
            proxy_set_header X-SSL-Client-Cert $ssl_client_escaped_cert;
            # Pass verification result
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
            # Pass the client cert DN
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
        }
    }
}
